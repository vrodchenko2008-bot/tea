<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для коханої людини — Чай</title>
  <style>
    /* Налаштування для коректного розрахунку розмірів */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh; /* Коректна висота для мобільних браузерів */
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #d8f3dc, #95d5b2);
      font-family: Arial, sans-serif;
      overflow: hidden; /* Запобігає зайвій прокрутці */
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    img {
      width: 80vw;
      max-width: 360px;
      height: auto;
      cursor: pointer;
      transition: transform 0.3s;
      border-radius: 15px; /* Додав трохи закруглення для фото */
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    img:hover {
      transform: scale(1.05);
    }

    /* Модальне вікно */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); /* Ефект розмиття фону */
      padding: 15px;
    }

    /* Стан при відкритті (центрування) */
    .modal.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 30px 25px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 310px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-content p {
      font-size: 17px;
      line-height: 1.6;
      color: #2d6a4f; /* Темно-зелений колір тексту під тему чаю */
      margin: 0;
    }

    /* Анімація появи вікна */
    @keyframes popUp {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo.png" alt="Чай" onclick="openModal()">
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <p>
      Для коханої людини 💚<br><br>
      Нехай цей чай зігріє тебе так само, як твої слова гріють мене ☕<br><br>
      Ти — мій спокій і тепло 🌿
    </p>
  </div>
</div>

<script>
  const modal = document.getElementById('modal');

  function openModal() {
    modal.classList.add('active');
    // Вимикаємо прокрутку при відкритті
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('active');
    // Повертаємо прокрутку
    document.body.style.overflow = 'auto';
  }

  // Закриття вікна при кліку на затемнену область
  window.onclick = function(event) {
    if (event.target === modal) {
      closeModal();
    }
  }
</script>

</body>
</html>
