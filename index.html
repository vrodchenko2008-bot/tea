<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для коханої людини — Чай</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #d8f3dc, #95d5b2);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    img {
      width: 80vw;
      max-width: 360px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    img:hover {
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-content {
      background: white;
      padding: 22px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 300px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .modal-content p {
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo.png" alt="Чай" onclick="openModal()">
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <p>
      Для коханої людини 💚<br><br>
      Нехай цей чай зігріє тебе так само, як твої слова гріють мене ☕
      Ти — мій спокій і тепло 🌿
    </p>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('modal').style.display = 'flex';
  }

  window.onclick = function(event) {
    const modal = document.getElementById('modal');
    if (event.target === modal) {
      modal.style.display = 'none';
    }
  }
</script>

</body>
</html>
