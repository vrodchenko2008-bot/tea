<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сердечко</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
    }

    .heart-btn {
        width: 80px;
        height: 80px;
        background: red;
        position: relative;
        transform: rotate(-45deg);
        cursor: pointer;
        transition: transform 0.2s;
    }

    .heart-btn:before,
    .heart-btn:after {
        content: "";
        width: 80px;
        height: 80px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    .heart-btn:before {
        top: -40px;
        left: 0;
    }

    .heart-btn:after {
        left: 40px;
        top: 0;
    }

    .heart-btn:active {
        transform: scale(1.2) rotate(-45deg);
    }

    .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: white;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        transition: 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 80%;
        max-width: 300px;
    }

    .popup.show {
        transform: translate(-50%, -50%) scale(1);
    }

    .popup .heart {
        font-size: 40px;
        color: red;
        margin-bottom: 10px;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    .message {
        font-size: 16px;
        color: #333;
    }

    .close {
        margin-top: 10px;
        padding: 8px 15px;
        border: none;
        background: #ff6b6b;
        color: white;
        border-radius: 10px;
        cursor: pointer;
    }

    @media (max-width: 480px) {
        .heart-btn {
            width: 60px;
            height: 60px;
        }
        .heart-btn:before,
        .heart-btn:after {
            width: 60px;
            height: 60px;
        }
        .heart-btn:before {
            top: -30px;
        }
        .heart-btn:after {
            left: 30px;
        }
    }
</style>
</head>
<body>

<div class="heart-btn" onclick="showPopup()"></div>

<div class="popup" id="popup">
    <div class="heart">❤️</div>
    <div class="message">
        Я тебе кохаю 💖<br>
        Нехай сьогодні у тебе буде гарний день 🌸<br><br>
        Усміхнись, ти прекрасна! 😊
    </div>
    <button class="close" onclick="hidePopup()">Закрити</button>
</div>

<script>
function showPopup() {
    document.getElementById('popup').classList.add('show');
}

function hidePopup() {
    document.getElementById('popup').classList.remove('show');
}
</script>

</body>
</html>
